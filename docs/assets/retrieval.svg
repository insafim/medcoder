<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#7a8aa0"/>
    </marker>
  </defs>

  <!-- clinical fact -->
  <rect x="8" y="96" width="118" height="56" rx="10" fill="#ffffff" stroke="#b6c2d2" stroke-width="1.5"/>
  <text x="67" y="120" text-anchor="middle" font-size="12.5" font-weight="600" fill="#33445c">clinical fact</text>
  <text x="67" y="137" text-anchor="middle" font-size="10" fill="#7a8aa0">+ synonyms</text>

  <!-- dense search -->
  <rect x="168" y="36" width="190" height="58" rx="9" fill="#eef2f7" stroke="#9fb2c9" stroke-width="1.5"/>
  <text x="263" y="60" text-anchor="middle" font-size="12.5" font-weight="600" fill="#22405f">Dense search</text>
  <text x="263" y="78" text-anchor="middle" font-size="10.5" fill="#6b7c93">matches meaning</text>

  <!-- lexical search -->
  <rect x="168" y="154" width="190" height="58" rx="9" fill="#eef2f7" stroke="#9fb2c9" stroke-width="1.5"/>
  <text x="263" y="178" text-anchor="middle" font-size="12.5" font-weight="600" fill="#22405f">Lexical search (BM25)</text>
  <text x="263" y="196" text-anchor="middle" font-size="10.5" fill="#6b7c93">matches exact words</text>

  <!-- RRF fusion -->
  <rect x="400" y="92" width="120" height="64" rx="9" fill="#eef2f7" stroke="#9fb2c9" stroke-width="1.5"/>
  <text x="460" y="118" text-anchor="middle" font-size="12.5" font-weight="600" fill="#22405f">RRF fusion</text>
  <text x="460" y="135" text-anchor="middle" font-size="10.5" fill="#6b7c93">merge by rank</text>

  <!-- whitelist -->
  <rect x="558" y="92" width="146" height="64" rx="9" fill="#fef4e6" stroke="#d99b46" stroke-width="1.5"/>
  <text x="631" y="118" text-anchor="middle" font-size="12.5" font-weight="600" fill="#8a5a18">Top-15 whitelist</text>
  <text x="631" y="135" text-anchor="middle" font-size="10.5" fill="#a8742b">real codes only</text>

  <!-- coder -->
  <rect x="742" y="92" width="150" height="64" rx="9" fill="#e4f3ef" stroke="#3fa392" stroke-width="1.5"/>
  <text x="817" y="118" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1c5a50">Coder agent</text>
  <text x="817" y="135" text-anchor="middle" font-size="10.5" font-weight="600" fill="#2c8c7c">picks 1 to N</text>

  <!-- arrows -->
  <g stroke="#7a8aa0" stroke-width="1.6" fill="none">
    <path d="M126,116 C148,108 150,78 166,68" marker-end="url(#ar)"/>
    <path d="M126,132 C148,140 150,176 166,184" marker-end="url(#ar)"/>
    <path d="M358,66 C382,74 384,104 398,114" marker-end="url(#ar)"/>
    <path d="M358,182 C382,174 384,144 398,134" marker-end="url(#ar)"/>
    <line x1="520" y1="124" x2="556" y2="124" marker-end="url(#ar)"/>
    <line x1="704" y1="124" x2="740" y2="124" marker-end="url(#ar)"/>
  </g>
</svg>
